# Kit Runner Configuration
# Version: 0.2.0

# LiteLLM Provider Configuration
llm:
  provider: openai
  model: qwen3-max
  api_base: "http://192.168.1.2:3264/v1"
  api_key: "dummy"
  temperature: 0.7
  max_tokens: 2048

# Storage Configuration
storage:
  base_dir: ~/.kit
  jobs_db: jobs.db
  outputs_dir: outputs
  manifests_dir: manifests
  scenarios_dir: scenarios

# Runner Configuration
runner:
  max_retries: 3
  retry_base_delay: 1.0  # seconds
  retry_max_delay: 30.0  # seconds
  step_timeout: 3600  # seconds (1 hour)
  health_check_interval: 5  # seconds

# Web Server Configuration
web:
  host: localhost
  port: 7700
  debug: false

# Pipeline Builder Configuration
pipeline:
  detect_shortcuts: true
  prefer_local_tools: true
  max_steps: 10

# Proxy Configuration
proxy:
  enabled: false
  socks5: "socks5://127.0.0.1:10808"
  auto_detect: true

# Tool-specific defaults
tools:
  yt-dlp:
    format: bestvideo+bestaudio/best
    output_template: "%(title)s.%(ext)s"
    proxy: ""
    audio_format: mp3
  ffmpeg:
    preset: medium
    crf: 23
  whisper:
    model: base
    language: null  # auto-detect
