<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Транскрибация аудио</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 520px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }
        input[type="file"],
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        .file-drop {
            border: 2px dashed #d0d5dd;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .file-drop:hover, .file-drop.dragover {
            border-color: #4a90d9;
            background: #f7faff;
        }
        .file-drop input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .file-drop-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .file-drop-text {
            font-size: 14px;
            color: #666;
        }
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #4a90d9;
            font-weight: 600;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover:not(:disabled) {
            background: #3a7bc8;
        }
        button:disabled {
            background: #b0b8c4;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.processing {
            display: block;
            background: #e8f0fe;
            color: #1a56a8;
        }
        .status.done {
            display: block;
            background: #e6f7ed;
            color: #1a7a42;
        }
        .status.error {
            display: block;
            background: #fde8e8;
            color: #a81a1a;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #d0d5dd;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4a90d9;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 13px;
            margin-top: 6px;
            color: #1a56a8;
        }
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #1a7a42;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }
        .download-btn:hover {
            background: #14632f;
        }
        .download-btn:disabled {
            background: #b0b8c4;
            cursor: not-allowed;
        }
        .download-progress {
            margin-top: 10px;
        }
        .download-progress .progress-bar {
            background: #1a7a42;
        }
        .download-progress .progress-text {
            color: #1a7a42;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(26,86,168,0.3);
            border-top-color: #1a56a8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Транскрибация аудио</h1>
        <p class="subtitle">Загрузите аудиофайл и получите текстовую расшифровку</p>

        <form id="transcribeForm">
            <div class="form-group">
                <div class="file-drop" id="fileDrop">
                    <div class="file-drop-icon">📁</div>
                    <div class="file-drop-text">Перетащите файл сюда или нажмите для выбора</div>
                    <div class="file-name" id="fileName"></div>
                    <input type="file" name="audio" id="audioFile" accept=".mp3,.wav,.m4a,.ogg,.flac,.aac,.wma,.opus" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="model">Модель</label>
                    <select name="model" id="model">
                        <option value="tiny">tiny (быстро, менее точно)</option>
                        <option value="base">base</option>
                        <option value="small" selected>small (баланс)</option>
                        <option value="medium">medium (медленно, точнее)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language">Язык</label>
                    <input type="text" name="language" id="language" placeholder="авто (ru, en, …)">
                </div>
            </div>

            <div class="form-group">
                <label for="chunk_seconds">Длина чанка (сек)</label>
                <input type="number" name="chunk_seconds" id="chunk_seconds" value="30" min="5" max="300">
            </div>

            <button type="submit" id="submitBtn">Транскрибировать</button>
        </form>

        <div class="status" id="status">
            <div id="statusContent"></div>
            <div class="progress-bar-container" id="transcribeProgressContainer" style="display:none;">
                <div class="progress-bar" id="transcribeProgress"></div>
            </div>
            <div class="progress-text" id="transcribeProgressText" style="display:none;"></div>
            <div class="download-progress" id="downloadProgress" style="display:none;">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="downloadProgress"></div>
                </div>
                <div class="progress-text" id="downloadProgressText"></div>
            </div>
        </div>
    </div>

    <script>
        const fileDrop = document.getElementById('fileDrop');
        const audioFile = document.getElementById('audioFile');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('transcribeForm');
        const status = document.getElementById('status');
        const statusContent = document.getElementById('statusContent');
        const transcribeProgressContainer = document.getElementById('transcribeProgressContainer');
        const transcribeProgress = document.getElementById('transcribeProgress');
        const transcribeProgressText = document.getElementById('transcribeProgressText');
        const submitBtn = document.getElementById('submitBtn');

        audioFile.addEventListener('change', () => {
            if (audioFile.files.length) {
                fileName.textContent = audioFile.files[0].name;
            }
        });

        fileDrop.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDrop.classList.add('dragover');
        });

        fileDrop.addEventListener('dragleave', () => {
            fileDrop.classList.remove('dragover');
        });

        fileDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDrop.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                audioFile.files = e.dataTransfer.files;
                fileName.textContent = e.dataTransfer.files[0].name;
            }
        });

        function resetProgress() {
            transcribeProgressContainer.style.display = 'none';
            transcribeProgressText.style.display = 'none';
            transcribeProgress.style.width = '0%';
            transcribeProgressText.textContent = '';
        }

        function setTranscribeProgress(percent) {
            transcribeProgressContainer.style.display = 'block';
            transcribeProgressText.style.display = 'block';
            transcribeProgress.style.width = percent + '%';
            transcribeProgressText.textContent = 'Транскрибация: ' + percent.toFixed(1) + '%';
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Б';
            const k = 1024;
            const sizes = ['Б', 'КБ', 'МБ', 'ГБ'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Загрузка файла…';
            status.className = 'status';
            status.style.display = 'none';
            resetProgress();

            const formData = new FormData(form);
            const file = audioFile.files[0];
            const totalSize = file ? file.size : 0;

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        submitBtn.textContent = 'Загрузка файла… ' + percent.toFixed(0) + '%';
                        status.className = 'status processing';
                        status.style.display = 'block';
                        setTranscribeProgress(percent);
                        transcribeProgressText.textContent = 'Загрузка: ' + formatBytes(e.loaded) + ' / ' + formatBytes(e.total) + ' (' + percent.toFixed(0) + '%)';
                    }
                });

                const taskId = await new Promise((resolve, reject) => {
                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            const data = JSON.parse(xhr.responseText);
                            if (data.error) reject(new Error(data.error));
                            else resolve(data.task_id);
                        } else {
                            reject(new Error('Ошибка сервера: ' + xhr.status));
                        }
                    };
                    xhr.onerror = () => reject(new Error('Ошибка сети'));
                    xhr.open('POST', '/transcribe');
                    xhr.send(formData);
                });

                if (totalSize > 0) {
                    transcribeProgress.style.width = '100%';
                    transcribeProgressText.textContent = 'Загрузка: ' + formatBytes(totalSize) + ' / ' + formatBytes(totalSize) + ' (100%)';
                }

                // Небольшая задержка, чтобы пользователь увидел 100% загрузки
                await new Promise(r => setTimeout(r, 300));
                resetProgress();

                status.className = 'status processing';
                status.style.display = 'block';
                statusContent.innerHTML = '<span class="spinner"></span> Транскрибация…';

                const poll = setInterval(async () => {
                    try {
                        console.log('Polling /status/' + taskId);
                        const resp = await fetch('/status/' + taskId);
                        console.log('Response status:', resp.status);
                        const s = await resp.json();
                        console.log('Status data:', s);
                        status.style.display = 'block';
                        if (s.status === 'processing' || s.status === 'pending') {
                            status.className = 'status processing';
                            statusContent.innerHTML = '<span class="spinner"></span> Транскрибация…';
                            if (s.progress !== undefined) {
                                setTranscribeProgress(s.progress);
                            }
                        } else if (s.status === 'done') {
                            clearInterval(poll);
                            transcribeProgress.style.width = '100%';
                            transcribeProgressText.textContent = 'Транскрибация: 100%';
                            status.className = 'status done';
                            statusContent.innerHTML = 'Готово!';
                            showDownloadButton(taskId);
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Транскрибировать';
                        } else if (s.status === 'error') {
                            clearInterval(poll);
                            transcribeProgressContainer.style.display = 'none';
                            transcribeProgressText.style.display = 'none';
                            status.className = 'status error';
                            statusContent.textContent = 'Ошибка: ' + s.error;
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Транскрибировать';
                        }
                    } catch (err) {
                        console.error('Poll error:', err);
                    }
                }, 1000);

            } catch (err) {
                status.className = 'status error';
                statusContent.textContent = 'Ошибка сети: ' + err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Транскрибировать';
            }
        });

        function showDownloadButton(taskId) {
            const btn = document.createElement('button');
            btn.className = 'download-btn';
            btn.textContent = 'Скачать результат';
            btn.onclick = () => downloadFile(taskId, btn);
            status.appendChild(btn);
        }

        async function downloadFile(taskId, btn) {
            btn.disabled = true;
            btn.textContent = 'Скачивание…';

            const downloadProgressContainer = document.getElementById('downloadProgress');
            const downloadProgressBar = document.getElementById('downloadProgress');
            const downloadProgressText = document.getElementById('downloadProgressText');
            downloadProgressContainer.style.display = 'block';
            downloadProgressBar.style.width = '0%';
            downloadProgressText.textContent = 'Скачивание: 0%';

            try {
                const response = await fetch('/download/' + taskId);
                if (!response.ok) throw new Error('Ошибка скачивания');

                const contentLength = response.headers.get('Content-Length');
                const total = contentLength ? parseInt(contentLength, 10) : 0;
                let loaded = 0;

                const reader = response.body.getReader();
                const chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    if (total > 0) {
                        const percent = (loaded / total) * 100;
                        downloadProgressBar.style.width = percent + '%';
                        downloadProgressText.textContent = 'Скачивание: ' + percent.toFixed(1) + '%';
                    }
                }

                downloadProgressBar.style.width = '100%';
                downloadProgressText.textContent = 'Скачивание: 100%';

                const blob = new Blob(chunks);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.match(/filename="(.+)"/)?.[1] || 'transcript.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                setTimeout(() => {
                    downloadProgressContainer.style.display = 'none';
                }, 2000);
                btn.textContent = 'Скачано ✓';
            } catch (err) {
                downloadProgressContainer.style.display = 'none';
                btn.disabled = false;
                btn.textContent = 'Скачать результат';
                alert('Ошибка при скачивании: ' + err.message);
            }
        }
    </script>
</body>
</html>
