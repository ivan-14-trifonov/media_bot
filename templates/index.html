<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Транскрибация аудио</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 520px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }
        input[type="file"],
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        .file-drop {
            border: 2px dashed #d0d5dd;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .file-drop:hover, .file-drop.dragover {
            border-color: #4a90d9;
            background: #f7faff;
        }
        .file-drop input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .file-drop-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .file-drop-text {
            font-size: 14px;
            color: #666;
        }
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #4a90d9;
            font-weight: 600;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover:not(:disabled) {
            background: #3a7bc8;
        }
        button:disabled {
            background: #b0b8c4;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.processing {
            display: block;
            background: #e8f0fe;
            color: #1a56a8;
        }
        .status.done {
            display: block;
            background: #e6f7ed;
            color: #1a7a42;
        }
        .status.error {
            display: block;
            background: #fde8e8;
            color: #a81a1a;
        }
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #1a7a42;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: #14632f;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(26,86,168,0.3);
            border-top-color: #1a56a8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Транскрибация аудио</h1>
        <p class="subtitle">Загрузите аудиофайл и получите текстовую расшифровку</p>

        <form id="transcribeForm">
            <div class="form-group">
                <div class="file-drop" id="fileDrop">
                    <div class="file-drop-icon">📁</div>
                    <div class="file-drop-text">Перетащите файл сюда или нажмите для выбора</div>
                    <div class="file-name" id="fileName"></div>
                    <input type="file" name="audio" id="audioFile" accept=".mp3,.wav,.m4a,.ogg,.flac,.aac,.wma,.opus" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="model">Модель</label>
                    <select name="model" id="model">
                        <option value="tiny">tiny (быстро, менее точно)</option>
                        <option value="base">base</option>
                        <option value="small" selected>small (баланс)</option>
                        <option value="medium">medium (медленно, точнее)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language">Язык</label>
                    <input type="text" name="language" id="language" placeholder="авто (ru, en, …)">
                </div>
            </div>

            <div class="form-group">
                <label for="chunk_seconds">Длина чанка (сек)</label>
                <input type="number" name="chunk_seconds" id="chunk_seconds" value="30" min="5" max="300">
            </div>

            <button type="submit" id="submitBtn">Транскрибировать</button>
        </form>

        <div class="status" id="status"></div>
    </div>

    <script>
        const fileDrop = document.getElementById('fileDrop');
        const audioFile = document.getElementById('audioFile');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('transcribeForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        audioFile.addEventListener('change', () => {
            if (audioFile.files.length) {
                fileName.textContent = audioFile.files[0].name;
            }
        });

        fileDrop.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDrop.classList.add('dragover');
        });

        fileDrop.addEventListener('dragleave', () => {
            fileDrop.classList.remove('dragover');
        });

        fileDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDrop.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                audioFile.files = e.dataTransfer.files;
                fileName.textContent = e.dataTransfer.files[0].name;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка…';
            status.className = 'status';
            status.style.display = 'none';

            const formData = new FormData(form);

            try {
                const resp = await fetch('/transcribe', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.error) {
                    status.className = 'status error';
                    status.textContent = 'Ошибка: ' + data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Транскрибировать';
                    return;
                }

                const taskId = data.task_id;
                status.className = 'status processing';
                status.innerHTML = '<span class="spinner"></span> Транскрибация…';

                const poll = setInterval(async () => {
                    const s = await fetch('/status/' + taskId).then(r => r.json());
                    if (s.status === 'done') {
                        clearInterval(poll);
                        status.className = 'status done';
                        status.innerHTML = 'Готово! <a class="download-btn" href="/download/' + taskId + '">Скачать результат</a>';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Транскрибировать';
                    } else if (s.status === 'error') {
                        clearInterval(poll);
                        status.className = 'status error';
                        status.textContent = 'Ошибка: ' + s.error;
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Транскрибировать';
                    }
                }, 2000);

            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Ошибка сети: ' + err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Транскрибировать';
            }
        });
    </script>
</body>
</html>
