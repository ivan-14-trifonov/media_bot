<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e1e1e1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo svg {
            width: 64px;
            height: 64px;
            fill: #ff0050;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.75rem;
            color: #fff;
        }

        .logo p {
            color: #888;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ff0050;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: #ff0050;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        button:hover { background: #e0004a; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-area {
            margin-top: 1.5rem;
            display: none;
        }

        .status-area.visible { display: block; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: #0f0f0f;
            border-radius: 8px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #ff0050;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 0.875rem;
            color: #aaa;
        }

        .status-text strong {
            color: #fff;
        }

        .download-btn {
            display: none;
            width: 100%;
            margin-top: 1rem;
            padding: 0.875rem;
            background: #00c853;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            color: #fff;
            transition: background 0.2s;
        }

        .download-btn.visible {
            display: block;
        }

        .download-btn:hover {
            background: #00a844;
        }

        .error-msg {
            display: none;
            margin-top: 1rem;
            padding: 0.875rem;
            background: #2a1015;
            border: 1px solid #5a2030;
            border-radius: 8px;
            color: #ff6b8a;
            font-size: 0.875rem;
        }

        .error-msg.visible { display: block; }

        .history {
            margin-top: 1.5rem;
        }

        .history h3 {
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.75rem;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0.75rem;
            background: #0f0f0f;
            border-radius: 6px;
            margin-bottom: 0.375rem;
            font-size: 0.8125rem;
        }

        .history-item .url {
            color: #aaa;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .history-item .badge {
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .badge.completed { background: #0a2a1a; color: #00c853; }
        .badge.failed { background: #2a1015; color: #ff6b8a; }
        .badge.pending { background: #1a1a2a; color: #6688ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3C10.9 3 10 3.9 10 5v5H5c-1.1 0-2 .9-2 2v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7c0-1.1-.9-2-2-2h-5V5c0-1.1-.9-2-2-2zm0 2h3v5H9V5h3zm-5 7h10v7H7v-7z"/>
            </svg>
            <h1>YouTube Audio Downloader</h1>
            <p>Вставьте ссылку — скачайте MP3</p>
        </div>

        <div class="card">
            <form id="downloadForm">
                <div class="input-group">
                    <input type="text" id="urlInput" name="url"
                           placeholder="https://youtube.com/watch?v=..." required autocomplete="off">
                    <button type="submit" id="submitBtn">Скачать</button>
                </div>
            </form>

            <div class="status-area" id="statusArea">
                <div class="status-bar">
                    <div class="spinner" id="spinner"></div>
                    <div class="status-text" id="statusText">
                        <strong>Загрузка...</strong>
                    </div>
                </div>
            </div>

            <a class="download-btn" id="downloadBtn" href="#">⬇ Скачать MP3</a>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="history" id="historySection" style="display:none">
            <h3>Последние загрузки</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');

        let pollInterval = null;
        let currentTaskId = null;
        let history = JSON.parse(localStorage.getItem('dl_history') || '[]');

        renderHistory();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if (!url) return;

            // Reset UI
            submitBtn.disabled = true;
            submitBtn.textContent = '...';
            statusArea.classList.add('visible');
            downloadBtn.classList.remove('visible');
            errorMsg.classList.remove('visible');
            spinner.style.display = 'block';
            statusText.innerHTML = '<strong>Загрузка...</strong> Пожалуйста, подождите';

            // Start download
            const formData = new FormData();
            formData.append('url', url);

            try {
                const resp = await fetch('/download', { method: 'POST', body: formData });
                const data = await resp.json();
                currentTaskId = data.task_id;

                // Poll status
                pollInterval = setInterval(pollStatus, 1500);
            } catch (err) {
                showError('Ошибка соединения: ' + err.message);
            }
        });

        async function pollStatus() {
            if (!currentTaskId) return;

            try {
                const resp = await fetch(`/status/${currentTaskId}`);
                const data = await resp.json();

                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    pollInterval = null;

                    spinner.style.display = 'none';
                    statusText.innerHTML = '<strong>Готово!</strong> Файл скачан';
                    downloadBtn.href = `/download/${currentTaskId}`;
                    downloadBtn.classList.add('visible');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Скачать';

                    addToHistory(urlInput.value, 'completed');
                    currentTaskId = null;
                } else if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    pollInterval = null;

                    spinner.style.display = 'none';
                    showError(data.error || 'Не удалось скачать');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Скачать';

                    addToHistory(urlInput.value, 'failed');
                    currentTaskId = null;
                } else {
                    statusText.innerHTML = '<strong>Загрузка...</strong> Пожалуйста, подождите';
                }
            } catch (err) {
                // ignore poll errors, keep polling
            }
        }

        function showError(msg) {
            spinner.style.display = 'none';
            statusText.innerHTML = '<strong>Ошибка</strong>';
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }

        function addToHistory(url, status) {
            history.unshift({ url, status, time: Date.now() });
            history = history.slice(0, 10);
            localStorage.setItem('dl_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) return;
            historySection.style.display = 'block';
            historyList.innerHTML = history.map(item => `
                <li class="history-item">
                    <span class="url" title="${item.url}">${item.url}</span>
                    <span class="badge ${item.status}">${item.status === 'completed' ? '✓' : '✗'}</span>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
